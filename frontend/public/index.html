<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <!-- Added viewport-fit=cover to fix the iOS notch/safe area issue -->
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover" />
    
    <!-- PWA & iOS Home Screen Settings -->
    <title>DIgilocker</title>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Digilocker" />
    
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- The `react-native-web` recommended style reset -->
    <style id="expo-reset">
      html,
      body {
        height: 100%;
        width: 100%;
        margin: 0;
        padding: 0;
        background-color: #ffffff;
        overflow-x: hidden;
      }
      body {
        overflow: hidden;
      }
      #root {
        display: flex;
        height: 100%;
        width: 100%;
        flex: 1;
      }
    </style>
  </head>
  <body>
    <noscript>
      You need to enable JavaScript to run this app.

    <div id="root"></div>
